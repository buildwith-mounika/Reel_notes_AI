<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">
<div class="top-bar">
    <button id="themeBtn" onclick="toggleTheme()" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>
</div> 
    <h1>🎥 ReelNotes AI</h1>
<p>Turn YouTube videos into easy-to-read AI notes.</p>

    <input type="text" id="videoUrl" placeholder="Paste YouTube URL here">
<div class="language-select">
    <label for="language">🌐 Summary Language</label>

    <select id="language">
        <option value="english">English</option>
        <option value="telugu">తెలుగు</option>
    </select>
</div>
    <button onclick="summarizeVideo()">Summarize</button>

   <div id="result">

<h2>Summary</h2>

<p id="summaryText">
Your AI summary will appear here.
</p>

<div class="actions">

<button onclick="copySummary()">
    <i class="fa-regular fa-copy"></i>
</button>

<button onclick="downloadPDF()">
    <i class="fa-solid fa-file-pdf"></i>
</button>

</div>

</div>

  

</div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
